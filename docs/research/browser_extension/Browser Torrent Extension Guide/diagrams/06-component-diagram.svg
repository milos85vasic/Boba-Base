<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" aria-label="BobaLink Component Diagram">
  <defs>
    <marker id="a6" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#888"/></marker>
    <filter id="s6"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1100" height="750" fill="#FAFAFA"/>
  <text x="550" y="28" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="600" fill="#2D5F8A">Component Diagram — BobaLink Extension</text>

  <!-- parser/ -->
  <rect x="20" y="50" width="230" height="180" rx="8" fill="#FFF8E1" stroke="#D4A76A" stroke-width="2" filter="url(#s6)"/>
  <text x="135" y="70" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#D4A76A">🔧 parser/</text>
  <rect x="30" y="80" width="210" height="40" rx="5" fill="#FFE0B2" stroke="#D4A76A" stroke-width="1.5" filter="url(#s6)"/>
  <text x="135" y="96" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">magnetParser.js</text>
  <text x="135" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">parseMagnetURI(), extractInfoHash()</text>
  <rect x="30" y="125" width="210" height="40" rx="5" fill="#FFE0B2" stroke="#D4A76A" stroke-width="1.5" filter="url(#s6)"/>
  <text x="135" y="141" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">torrentParser.js</text>
  <text x="135" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">parseTorrentFile(), extractMetadata()</text>
  <rect x="30" y="170" width="210" height="40" rx="5" fill="#FFE0B2" stroke="#D4A76A" stroke-width="1.5" filter="url(#s6)"/>
  <text x="135" y="186" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">hashNormalizer.js</text>
  <text x="135" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">normalizeInfoHash(), validateHash()</text>

  <!-- scanner/ -->
  <rect x="270" y="50" width="230" height="180" rx="8" fill="#E8F5E9" stroke="#4A8C6F" stroke-width="2" filter="url(#s6)"/>
  <text x="385" y="70" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#4A8C6F">🔍 scanner/</text>
  <rect x="280" y="80" width="210" height="40" rx="5" fill="#C8E6C9" stroke="#4A8C6F" stroke-width="1.5" filter="url(#s6)"/>
  <text x="385" y="96" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">domScanner.js</text>
  <text x="385" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">scanForLinks(), MutationObserver</text>
  <rect x="280" y="125" width="210" height="40" rx="5" fill="#C8E6C9" stroke="#4A8C6F" stroke-width="1.5" filter="url(#s6)"/>
  <text x="385" y="141" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">linkExtractor.js</text>
  <text x="385" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">extractMagnetLinks(), extractTorrentLinks()</text>
  <rect x="280" y="170" width="210" height="40" rx="5" fill="#C8E6C9" stroke="#4A8C6F" stroke-width="1.5" filter="url(#s6)"/>
  <text x="385" y="186" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">torrentBadge.js</text>
  <text x="385" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">injectBadge(), highlightTorrents()</text>

  <!-- api/ -->
  <rect x="520" y="50" width="230" height="180" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" filter="url(#s6)"/>
  <text x="635" y="70" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#1976D2">🔌 api/</text>
  <rect x="530" y="80" width="210" height="40" rx="5" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5" filter="url(#s6)"/>
  <text x="635" y="96" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">BobaAPIClient.js</text>
  <text x="635" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">sendTorrent(), sendBatch(), healthCheck()</text>
  <rect x="530" y="125" width="210" height="40" rx="5" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5" filter="url(#s6)"/>
  <text x="635" y="141" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">authManager.js</text>
  <text x="635" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">getAuthHeaders(), refreshToken()</text>
  <rect x="530" y="170" width="210" height="40" rx="5" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5" filter="url(#s6)"/>
  <text x="635" y="186" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">retryHandler.js</text>
  <text x="635" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">exponentialBackoff(), circuitBreaker()</text>

  <!-- background/ -->
  <rect x="20" y="255" width="310" height="200" rx="8" fill="#E8F0FE" stroke="#2D5F8A" stroke-width="2" filter="url(#s6)"/>
  <text x="175" y="275" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#2D5F8A">⚙️ background/</text>
  <rect x="30" y="285" width="140" height="45" rx="5" fill="#BBDEFB" stroke="#2D5F8A" stroke-width="1.5" filter="url(#s6)"/>
  <text x="100" y="302" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">background.js</text>
  <text x="100" y="318" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">event listeners, message router</text>
  <rect x="180" y="285" width="140" height="45" rx="5" fill="#BBDEFB" stroke="#2D5F8A" stroke-width="1.5" filter="url(#s6)"/>
  <text x="250" y="302" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">contextMenuHandler.js</text>
  <text x="250" y="318" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">createMenus(), handleClicks()</text>
  <rect x="30" y="340" width="140" height="45" rx="5" fill="#BBDEFB" stroke="#2D5F8A" stroke-width="1.5" filter="url(#s6)"/>
  <text x="100" y="357" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">queueManager.js</text>
  <text x="100" y="373" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">enqueue(), processQueue(), retryFailed()</text>
  <rect x="180" y="340" width="140" height="45" rx="5" fill="#BBDEFB" stroke="#2D5F8A" stroke-width="1.5" filter="url(#s6)"/>
  <text x="250" y="357" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">tabGroupProcessor.js</text>
  <text x="250" y="373" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">queryGroups(), processTabs()</text>
  <text x="175" y="405" text-anchor="middle" font-family="system-ui" font-size="8" fill="#888">Entry point: background.js registers all listeners on install/startup</text>

  <!-- content/ -->
  <rect x="350" y="255" width="200" height="150" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2" filter="url(#s6)"/>
  <text x="450" y="275" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#7B1FA2">📄 content/</text>
  <rect x="360" y="285" width="180" height="50" rx="5" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="1.5" filter="url(#s6)"/>
  <text x="450" y="304" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">content.js</text>
  <text x="450" y="320" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">initialize(), DOM scan trigger</text>
  <rect x="360" y="342" width="180" height="50" rx="5" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="1.5" filter="url(#s6)"/>
  <text x="450" y="361" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">contentUI.js</text>
  <text x="450" y="377" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">injectPanel(), showTorrentList()</text>

  <!-- popup/ -->
  <rect x="570" y="255" width="200" height="200" rx="8" fill="#E8F0FE" stroke="#5B9BD5" stroke-width="2" filter="url(#s6)"/>
  <text x="670" y="275" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#5B9BD5">📋 popup/</text>
  <rect x="580" y="285" width="180" height="50" rx="5" fill="#BBDEFB" stroke="#5B9BD5" stroke-width="1.5" filter="url(#s6)"/>
  <text x="670" y="304" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">popup.js</text>
  <text x="670" y="320" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">renderTorrentList(), handleSend()</text>
  <rect x="580" y="342" width="180" height="45" rx="5" fill="#BBDEFB" stroke="#5B9BD5" stroke-width="1.5" filter="url(#s6)"/>
  <text x="670" y="360" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">popup.html</text>
  <text x="670" y="374" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">UI markup structure</text>
  <rect x="580" y="394" width="180" height="45" rx="5" fill="#BBDEFB" stroke="#5B9BD5" stroke-width="1.5" filter="url(#s6)"/>
  <text x="670" y="412" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">popup.css</text>
  <text x="670" y="426" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">Styles and animations</text>

  <!-- options/ -->
  <rect x="790" y="255" width="200" height="150" rx="8" fill="#F5F5F5" stroke="#666" stroke-width="2" filter="url(#s6)"/>
  <text x="890" y="275" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#666">⚙️ options/</text>
  <rect x="800" y="285" width="180" height="50" rx="5" fill="#E0E0E0" stroke="#666" stroke-width="1.5" filter="url(#s6)"/>
  <text x="890" y="304" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">options.js</text>
  <text x="890" y="320" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">saveConfig(), loadConfig(), validateServer()</text>
  <rect x="800" y="342" width="180" height="50" rx="5" fill="#E0E0E0" stroke="#666" stroke-width="1.5" filter="url(#s6)"/>
  <text x="890" y="361" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">options.html</text>
  <text x="890" y="377" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">Settings form with validation</text>

  <!-- shared/ -->
  <rect x="350" y="470" width="540" height="130" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="2" filter="url(#s6)"/>
  <text x="620" y="490" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#E65100">📁 shared/</text>
  <rect x="360" y="498" width="170" height="50" rx="5" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5" filter="url(#s6)"/>
  <text x="445" y="516" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">constants.js</text>
  <text x="445" y="532" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">MSG_TYPES, API_ENDPOINTS, DEFAULTS</text>
  <rect x="540" y="498" width="170" height="50" rx="5" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5" filter="url(#s6)"/>
  <text x="625" y="516" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">utils.js</text>
  <text x="625" y="532" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">debounce(), throttle(), formatBytes()</text>
  <rect x="720" y="498" width="160" height="50" rx="5" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5" filter="url(#s6)"/>
  <text x="800" y="516" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">storageAPI.js</text>
  <text x="800" y="532" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">getConfig(), setConfig(), getHistory()</text>
  <text x="620" y="585" text-anchor="middle" font-family="system-ui" font-size="8" fill="#888">Shared utilities used by all modules. No external dependencies.</text>

  <!-- Dependencies -->
  <line x1="385" y1="230" x2="250" y2="230" stroke="#4A8C6F" stroke-width="1.5" marker-end="url(#a6)"/>
  <text x="315" y="245" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">uses</text>
  <line x1="450" y1="255" x2="450" y2="230" stroke="#7B1FA2" stroke-width="1.5" marker-end="url(#a6)"/>
  <line x1="330" y1="350" x2="350" y2="380" stroke="#2D5F8A" stroke-width="1.5" marker-end="url(#a6)"/>
  <text x="300" y="385" font-family="system-ui" font-size="8" fill="#666">uses</text>
  <line x1="570" y1="350" x2="520" y2="230" stroke="#5B9BD5" stroke-width="1.5" marker-end="url(#a6)"/>
  <text x="560" y="260" font-family="system-ui" font-size="8" fill="#666">uses</text>
  <line x1="670" y1="455" x2="670" y2="470" stroke="#5B9BD5" stroke-width="1.5" marker-end="url(#a6)"/>
  <line x1="175" y1="455" x2="175" y2="470" stroke="#2D5F8A" stroke-width="1.5" marker-end="url(#a6)"/>
  <text x="155" y="465" font-family="system-ui" font-size="8" fill="#666">uses</text>
  <line x1="890" y1="405" x2="890" y2="498" stroke="#666" stroke-width="1.5" marker-end="url(#a6)"/>
  <line x1="620" y1="230" x2="620" y2="470" stroke="#1976D2" stroke-width="1.5" marker-end="url(#a6)"/>
  <text x="610" y="380" font-family="system-ui" font-size="8" fill="#666">uses</text>
  <line x1="135" y1="230" x2="135" y2="470" stroke="#D4A76A" stroke-width="1.5" marker-end="url(#a6)"/>
  <text x="125" y="380" font-family="system-ui" font-size="8" fill="#666">uses</text>

  <!-- Dashed messaging lines -->
  <line x1="450" y1="405" x2="175" y2="455" stroke="#7B1FA2" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a6)"/>
  <text x="250" y="435" font-family="system-ui" font-size="8" fill="#7B1FA2">messaging</text>
  <line x1="670" y1="455" x2="175" y2="455" stroke="#5B9BD5" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a6)"/>
  <text x="420" y="452" font-family="system-ui" font-size="8" fill="#5B9BD5">messaging</text>

  <!-- Legend -->
  <rect x="20" y="620" width="1060" height="110" rx="8" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="550" y="642" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#333">Dependency Rules</text>
  <text x="40" y="664" font-family="system-ui" font-size="9" fill="#666">
    <tspan x="40" fill="#D4A76A" font-weight="700">parser/</tspan>: Pure functions, no side effects. Depends on shared/ for constants only.
  </text>
  <text x="40" y="682" font-family="system-ui" font-size="9" fill="#666">
    <tspan x="40" fill="#4A8C6F" font-weight="700">scanner/</tspan>: DOM-dependent. Uses parser/ for normalization. No external API calls.
  </text>
  <text x="40" y="700" font-family="system-ui" font-size="9" fill="#666">
    <tspan x="40" fill="#1976D2" font-weight="700">api/</tspan>: HTTP client layer. Depends on shared/ for config and auth. Handles all retry logic.
  </text>
  <text x="560" y="664" font-family="system-ui" font-size="9" fill="#666">
    <tspan x="560" fill="#2D5F8A" font-weight="700">background/</tspan>: Orchestration layer. Uses api/ and shared/. Routes all messages.
  </text>
  <text x="560" y="682" font-family="system-ui" font-size="9" fill="#666">
    <tspan x="560" fill="#7B1FA2" font-weight="700">content/</tspan>: Runs in page context. Uses scanner/. Communicates with background/ via messages.
  </text>
  <text x="560" y="700" font-family="system-ui" font-size="9" fill="#666">
    <tspan x="560" fill="#5B9BD5" font-weight="700">popup/</tspan>: UI only. Uses shared/ for storage. Communicates with background/ via messages.
  </text>
</svg>
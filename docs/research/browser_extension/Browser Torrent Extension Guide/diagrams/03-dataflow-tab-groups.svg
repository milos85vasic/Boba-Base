<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650" aria-label="BobaLink Tab Groups Batch Processing Data Flow">
  <defs>
    <marker id="a3" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <filter id="s3"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1100" height="650" fill="#FAFAFA"/>
  <text x="550" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="600" fill="#2D5F8A">Data Flow — Tab Groups Batch Processing</text>

  <!-- User Action -->
  <rect x="20" y="55" width="160" height="120" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2" filter="url(#s3)"/>
  <text x="100" y="75" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#7B1FA2">👤 User Action</text>
  <rect x="30" y="85" width="140" height="35" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1" filter="url(#s3)"/>
  <text x="100" y="100" text-anchor="middle" font-family="system-ui" font-size="9" fill="#333">Right-click on Tab Group</text>
  <text x="100" y="112" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">in tab bar</text>
  <rect x="30" y="130" width="140" height="35" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1" filter="url(#s3)"/>
  <text x="100" y="145" text-anchor="middle" font-family="system-ui" font-size="9" fill="#333">Select 'Send all torrents</text>
  <text x="100" y="157" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">to qBitTorrent'</text>

  <!-- Background SW -->
  <rect x="210" y="55" width="220" height="540" rx="8" fill="#E8F0FE" stroke="#2D5F8A" stroke-width="2" filter="url(#s3)"/>
  <text x="320" y="75" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#2D5F8A">🔧 Background SW</text>

  <rect x="220" y="88" width="200" height="55" rx="5" fill="#E8F0FE" stroke="#2D5F8A" stroke-width="1.5" filter="url(#s3)"/>
  <text x="320" y="106" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">contextMenus.onClicked</text>
  <text x="320" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">Event listener</text>
  <text x="320" y="132" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">info.menuItemId</text>

  <rect x="220" y="155" width="200" height="55" rx="5" fill="#E8F0FE" stroke="#2D5F8A" stroke-width="1.5" filter="url(#s3)"/>
  <text x="320" y="173" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">chrome.tabGroups.query</text>
  <text x="320" y="187" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">{title: groupName}</text>
  <text x="320" y="199" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">Returns group object</text>

  <rect x="220" y="222" width="200" height="55" rx="5" fill="#E8F0FE" stroke="#2D5F8A" stroke-width="1.5" filter="url(#s3)"/>
  <text x="320" y="240" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">chrome.tabs.query</text>
  <text x="320" y="254" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">{groupId: gid}</text>
  <text x="320" y="266" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">Array of tab objects</text>

  <rect x="220" y="290" width="200" height="55" rx="5" fill="#FFF8E1" stroke="#D4A76A" stroke-width="1.5" filter="url(#s3)"/>
  <text x="320" y="308" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">Collect Results</text>
  <text x="320" y="322" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">Aggregate torrents[]</text>
  <text x="320" y="334" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">from all content scripts</text>

  <rect x="220" y="358" width="200" height="55" rx="5" fill="#E8F0FE" stroke="#2D5F8A" stroke-width="1.5" filter="url(#s3)"/>
  <text x="320" y="376" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">Flatten &amp; Deduplicate</text>
  <text x="320" y="390" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">Remove duplicates by hash</text>
  <text x="320" y="402" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">Normalize all entries</text>

  <rect x="220" y="426" width="200" height="55" rx="5" fill="#E8F0FE" stroke="#2D5F8A" stroke-width="1.5" filter="url(#s3)"/>
  <text x="320" y="444" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">BobaAPIClient.sendBatch()</text>
  <text x="320" y="458" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">HTTP POST with JSON array</text>
  <text x="320" y="470" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">Retry logic &amp; timeout</text>

  <!-- Response -->
  <rect x="220" y="500" width="200" height="80" rx="5" fill="#E8F5E9" stroke="#4A8C6F" stroke-width="1.5" filter="url(#s3)"/>
  <text x="320" y="520" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">Handle Response</text>
  <text x="320" y="536" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">200 OK → Show notification</text>
  <text x="320" y="550" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">4xx/5xx → Queue for retry</text>
  <text x="320" y="564" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">Offline → Save to queue</text>

  <!-- Tab Group -->
  <rect x="460" y="55" width="160" height="200" rx="8" fill="#E8F5E9" stroke="#4A8C6F" stroke-width="2" filter="url(#s3)"/>
  <text x="540" y="75" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#4A8C6F">📑 Tab Group</text>
  <rect x="470" y="88" width="140" height="35" rx="4" fill="#C8E6C9" stroke="#4A8C6F" stroke-width="1" filter="url(#s3)"/>
  <text x="540" y="104" text-anchor="middle" font-family="system-ui" font-size="9" fill="#333">Tab 1 — torrentsite.a</text>
  <text x="540" y="116" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">groupId: 123</text>
  <rect x="470" y="130" width="140" height="35" rx="4" fill="#C8E6C9" stroke="#4A8C6F" stroke-width="1" filter="url(#s3)"/>
  <text x="540" y="146" text-anchor="middle" font-family="system-ui" font-size="9" fill="#333">Tab 2 — torrentsite.b</text>
  <text x="540" y="158" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">groupId: 123</text>
  <rect x="470" y="172" width="140" height="35" rx="4" fill="#C8E6C9" stroke="#4A8C6F" stroke-width="1" filter="url(#s3)"/>
  <text x="540" y="188" text-anchor="middle" font-family="system-ui" font-size="9" fill="#333">Tab 3 — torrentsite.c</text>
  <text x="540" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">groupId: 123</text>
  <rect x="470" y="214" width="140" height="30" rx="4" fill="#C8E6C9" stroke="#4A8C6F" stroke-width="1" filter="url(#s3)"/>
  <text x="540" y="232" text-anchor="middle" font-family="system-ui" font-size="9" fill="#666">Tab N — ...</text>

  <!-- Content Scripts -->
  <rect x="650" y="55" width="160" height="200" rx="8" fill="#FFF8E1" stroke="#D4A76A" stroke-width="2" filter="url(#s3)"/>
  <text x="730" y="75" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#D4A76A">📄 Content Scripts</text>
  <rect x="660" y="88" width="140" height="35" rx="4" fill="#FFE0B2" stroke="#D4A76A" stroke-width="1" filter="url(#s3)"/>
  <text x="730" y="104" text-anchor="middle" font-family="system-ui" font-size="9" fill="#333">content.js — Tab 1</text>
  <text x="730" y="116" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">scan &amp; extract links</text>
  <rect x="660" y="130" width="140" height="35" rx="4" fill="#FFE0B2" stroke="#D4A76A" stroke-width="1" filter="url(#s3)"/>
  <text x="730" y="146" text-anchor="middle" font-family="system-ui" font-size="9" fill="#333">content.js — Tab 2</text>
  <text x="730" y="158" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">scan &amp; extract links</text>
  <rect x="660" y="172" width="140" height="35" rx="4" fill="#FFE0B2" stroke="#D4A76A" stroke-width="1" filter="url(#s3)"/>
  <text x="730" y="188" text-anchor="middle" font-family="system-ui" font-size="9" fill="#333">content.js — Tab 3</text>
  <text x="730" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">scan &amp; extract links</text>
  <rect x="660" y="214" width="140" height="30" rx="4" fill="#FFE0B2" stroke="#D4A76A" stroke-width="1" filter="url(#s3)"/>
  <text x="730" y="232" text-anchor="middle" font-family="system-ui" font-size="9" fill="#666">content.js — Tab N</text>

  <!-- Boba Services -->
  <rect x="840" y="55" width="240" height="180" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" filter="url(#s3)"/>
  <text x="960" y="75" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#1976D2">🐳 Boba Services</text>
  <rect x="855" y="88" width="210" height="55" rx="5" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5" filter="url(#s3)"/>
  <text x="960" y="108" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">POST /api/torrents/batch</text>
  <text x="960" y="124" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">JSON array of magnet URIs</text>
  <text x="960" y="136" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">With metadata &amp; categories</text>
  <rect x="855" y="155" width="210" height="60" rx="5" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5" filter="url(#s3)"/>
  <text x="960" y="175" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#333">Batch Validation</text>
  <text x="960" y="191" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">Validate each torrent URL</text>
  <text x="960" y="203" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">Enrich with metadata</text>

  <!-- qBitTorrent -->
  <rect x="840" y="255" width="240" height="130" rx="8" fill="#E8EAF6" stroke="#3F51B5" stroke-width="2" filter="url(#s3)"/>
  <text x="960" y="275" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#3F51B5">⬇️ qBitTorrent</text>
  <rect x="855" y="290" width="210" height="35" rx="4" fill="#C5CAE9" stroke="#3F51B5" stroke-width="1" filter="url(#s3)"/>
  <text x="960" y="308" text-anchor="middle" font-family="system-ui" font-size="9" fill="#333">/api/v2/torrents/add (batch)</text>
  <text x="960" y="320" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">urls=magnet1\nmagnet2\n...</text>
  <rect x="855" y="335" width="210" height="35" rx="4" fill="#E8F5E9" stroke="#4A8C6F" stroke-width="1.5" filter="url(#s3)"/>
  <text x="960" y="353" text-anchor="middle" font-family="system-ui" font-size="9" fill="#333">All torrents added ✓</text>
  <text x="960" y="365" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">200 OK + per-torrent status</text>

  <!-- Arrows -->
  <line x1="180" y1="120" x2="220" y2="115" stroke="#7B1FA2" stroke-width="2" marker-end="url(#a3)"/>
  <line x1="320" y1="143" x2="320" y2="155" stroke="#2D5F8A" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="320" y1="210" x2="320" y2="222" stroke="#2D5F8A" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="420" y1="250" x2="460" y2="150" stroke="#2D5F8A" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="420" y1="250" x2="460" y2="180" stroke="#2D5F8A" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- Tab to CS -->
  <line x1="610" y1="105" x2="660" y2="105" stroke="#4A8C6F" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a3)"/>
  <line x1="610" y1="147" x2="660" y2="147" stroke="#4A8C6F" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a3)"/>
  <line x1="610" y1="189" x2="660" y2="189" stroke="#4A8C6F" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a3)"/>
  <line x1="610" y1="230" x2="660" y2="230" stroke="#4A8C6F" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a3)"/>

  <!-- CS to Collect -->
  <line x1="660" y1="270" x2="430" y2="320" stroke="#D4A76A" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="660" y1="270" x2="430" y2="300" stroke="#D4A76A" stroke-width="1.5" marker-end="url(#a3)"/>

  <line x1="320" y1="277" x2="320" y2="290" stroke="#2D5F8A" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="320" y1="345" x2="320" y2="358" stroke="#2D5F8A" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="420" y1="453" x2="855" y2="140" stroke="#2D5F8A" stroke-width="2" marker-end="url(#a3)"/>
  <line x1="1065" y1="140" x2="1065" y2="290" stroke="#1976D2" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- Return -->
  <line x1="960" y1="255" x2="960" y2="200" stroke="#3F51B5" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a3)"/>
  <line x1="855" y1="180" x2="420" y2="500" stroke="#4A8C6F" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a3)"/>

  <!-- Summary -->
  <rect x="460" y="280" width="360" height="315" rx="8" fill="#F9F9F9" stroke="#E0E0E0" stroke-width="1"/>
  <text x="640" y="305" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#2D5F8A">Batch Processing Summary</text>
  <text x="475" y="330" font-family="system-ui" font-size="9" fill="#555">
    <tspan x="475" dy="0">① User right-clicks a tab group in the Chrome tab bar</tspan>
    <tspan x="475" dy="16">② Context menu handler captures the group ID</tspan>
    <tspan x="475" dy="16">③ chrome.tabGroups.query fetches group metadata</tspan>
    <tspan x="475" dy="16">④ chrome.tabs.query returns all tabs in the group</tspan>
    <tspan x="475" dy="16">⑤ Content script injected into each tab (executeScript)</tspan>
    <tspan x="475" dy="16">⑥ Each CS scans DOM and returns found torrents[]</tspan>
    <tspan x="475" dy="16">⑦ Background SW collects and deduplicates results</tspan>
    <tspan x="475" dy="16">⑧ BobaAPIClient.sendBatch() sends HTTP POST</tspan>
    <tspan x="475" dy="16">⑨ Boba Service validates each entry in the batch</tspan>
    <tspan x="475" dy="16">⑩ qBitTorrent WebUI adds all torrents at once</tspan>
    <tspan x="475" dy="16">⑪ Response: 200 OK with per-torrent status array</tspan>
    <tspan x="475" dy="16">⑫ Notification: "N torrents added successfully"</tspan>
    <tspan x="475" dy="16">⑬ Failed entries saved to retry queue</tspan>
    <tspan x="475" dy="16">⑭ Offline entries saved for later send</tspan>
  </text>

  <!-- Error Handling -->
  <rect x="840" y="400" width="240" height="195" rx="8" fill="#FFEBEE" stroke="#C75450" stroke-width="1.5"/>
  <text x="960" y="422" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="700" fill="#C75450">⚠️ Error Handling</text>
  <text x="855" y="445" font-family="system-ui" font-size="8" fill="#666">
    <tspan x="855" dy="0">• Partial batch failure → retry</tspan>
    <tspan x="855" dy="14">  failed items individually</tspan>
    <tspan x="855" dy="14">• Network timeout → exponential</tspan>
    <tspan x="855" dy="14">  backoff (1s, 2s, 4s, 8s)</tspan>
    <tspan x="855" dy="14">• 401 Unauthorized → refresh</tspan>
    <tspan x="855" dy="14">  auth token &amp; retry once</tspan>
    <tspan x="855" dy="14">• Offline → persist to queue,</tspan>
    <tspan x="855" dy="14">  auto-retry on reconnect</tspan>
    <tspan x="855" dy="14">• Rate limit (429) → wait for</tspan>
    <tspan x="855" dy="14">  Retry-After header</tspan>
  </text>
</svg>
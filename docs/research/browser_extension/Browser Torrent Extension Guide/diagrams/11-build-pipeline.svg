  <!-- CI/CD Configuration -->
  <rect x="20" y="355" width="580" height="200" rx="10" fill="#E8F0FE" stroke="#2D5F8A" stroke-width="1.5" filter="url(#s11)"/>
  <text x="310" y="377" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="700" fill="#2D5F8A">⚙️ GitHub Actions CI/CD Configuration</text>

  <rect x="35" y="392" width="170" height="70" rx="6" fill="#BBDEFB" stroke="#2D5F8A" stroke-width="1.5" filter="url(#s11)"/>
  <text x="120" y="412" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="#333">Push / PR</text>
  <text x="120" y="430" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">Triggers: Lint + Test</text>
  <text x="120" y="444" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">Fast feedback loop</text>

  <rect x="220" y="392" width="170" height="70" rx="6" fill="#BBDEFB" stroke="#2D5F8A" stroke-width="1.5" filter="url(#s11)"/>
  <text x="305" y="412" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="#333">Release Published</text>
  <text x="305" y="430" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">Triggers: Full pipeline</text>
  <text x="305" y="444" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">Build + Package + Deploy</text>

  <rect x="405" y="392" width="180" height="70" rx="6" fill="#BBDEFB" stroke="#2D5F8A" stroke-width="1.5" filter="url(#s11)"/>
  <text x="495" y="412" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="#333">Weekly Schedule</text>
  <text x="495" y="430" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">Dependency check</text>
  <text x="495" y="444" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">Security audit (npm audit)</text>

  <rect x="35" y="475" width="550" height="65" rx="6" fill="#F9F9F9" stroke="#E0E0E0" stroke-width="1"/>
  <text x="50" y="493" font-family="system-ui" font-size="9" fill="#666" font-weight="700">Workflow YAML:</text>
  <text x="50" y="511" font-family="system-ui" font-size="8" fill="#666">• ci.yml: lint → test (on push/PR)</text>
  <text x="50" y="527" font-family="system-ui" font-size="8" fill="#666">• release.yml: lint → test → build → package → deploy (on release)</text>
  <text x="300" y="511" font-family="system-ui" font-size="8" fill="#666">• audit.yml: npm audit (weekly cron)</text>
  <text x="300" y="527" font-family="system-ui" font-size="8" fill="#666">• version-bump.yml: automated manifest version (on tag)</text>

  <!-- Quality Gates -->

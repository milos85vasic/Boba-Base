  <text x="762" y="483" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">eslint src/ --max-warnings=0</text>

  <rect x="905" y="392" width="260" height="45" rx="6" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5" filter="url(#s11)"/>
  <text x="1035" y="410" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="#333">Valid manifest.json</text>
  <text x="1035" y="428" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">Schema validation against manifest v3 spec</text>

  <rect x="905" y="447" width="260" height="45" rx="6" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5" filter="url(#s11)"/>
  <text x="1035" y="465" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="#333">Package Size &lt; 5MB</text>
  <text x="1035" y="483" text-anchor="middle" font-family="system-ui" font-size="8" fill="#666">Store limit compliance check</text>

  <rect x="635" y="502" width="530" height="40" rx="6" fill="#F9F9F9" stroke="#E0E0E0" stroke-width="1"/>
  <text x="650" y="517" font-family="system-ui" font-size="9" fill="#666" font-weight="700">Additional Checks:</text>
  <text x="650" y="533" font-family="system-ui" font-size="8" fill="#666">No secrets in code (gitleaks) | No console.log in production | TypeScript strict mode</text>

  <!-- Build Process Detail -->
  <rect x="20" y="575" width="1160" height="155" rx="10" fill="#F9F9F9" stroke="#E0E0E0" stroke-width="1.5" filter="url(#s11)"/>
  <text x="600" y="597" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="700" fill="#333">🔨 Build Process Details</text>

  <rect x="35" y="610" width="200" height="105" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <text x="135" y="628" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="#1976D2">1. Source Processing</text>
  <text x="45" y="646" font-family="system-ui" font-size="8" fill="#666">• Babel transpile ES2022 → ES2020</text>
  <text x="45" y="662" font-family="system-ui" font-size="8" fill="#666">• TypeScript compilation</text>
  <text x="45" y="678" font-family="system-ui" font-size="8" fill="#666">• Import resolution</text>
  <text x="45" y="694" font-family="system-ui" font-size="8" fill="#666">• Tree shaking dead code</text>

  <rect x="250" y="610" width="200" height="105" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <text x="350" y="628" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="#1976D2">2. Bundling</text>
  <text x="260" y="646" font-family="system-ui" font-size="8" fill="#666">• Webpack chunk splitting</text>
  <text x="260" y="662" font-family="system-ui" font-size="8" fill="#666">• Background, content, popup</text>
  <text x="260" y="678" font-family="system-ui" font-size="8" fill="#666">  separate entry points</text>
  <text x="260" y="694" font-family="system-ui" font-size="8" fill="#666">• Shared vendor chunk</text>

  <rect x="465" y="610" width="200" height="105" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <text x="565" y="628" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="#1976D2">3. Optimization</text>
  <text x="475" y="646" font-family="system-ui" font-size="8" fill="#666">• Terser minification</text>
  <text x="475" y="662" font-family="system-ui" font-size="8" fill="#666">• CSS purging (PurgeCSS)</text>
  <text x="475" y="678" font-family="system-ui" font-size="8" fill="#666">• Asset optimization</text>
  <text x="475" y="694" font-family="system-ui" font-size="8" fill="#666">• Source maps (dev only)</text>

  <rect x="680" y="610" width="200" height="105" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <text x="780" y="628" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="#1976D2">4. Extension Package</text>
  <text x="690" y="646" font-family="system-ui" font-size="8" fill="#666">• manifest.json validation</text>
  <text x="690" y="662" font-family="system-ui" font-size="8" fill="#666">• Icon set verification</text>
  <text x="690" y="678" font-family="system-ui" font-size="8" fill="#666">• ZIP archive creation</text>
  <text x="690" y="694" font-family="system-ui" font-size="8" fill="#666">• Size verification</text>

  <rect x="895" y="610" width="270" height="105" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <text x="1030" y="628" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="#1976D2">5. Browser-Specific Builds</text>
  <text x="905" y="646" font-family="system-ui" font-size="8" fill="#666">• Chrome: manifest v3 (default)</text>
  <text x="905" y="662" font-family="system-ui" font-size="8" fill="#666">• Firefox: manifest v2 compat</text>
  <text x="905" y="678" font-family="system-ui" font-size="8" fill="#666">• Opera: Chromium compatible</text>
  <text x="905" y="694" font-family="system-ui" font-size="8" fill="#666">• Edge: Chromium compatible</text>
  <text x="905" y="710" font-family="system-ui" font-size="8" fill="#666">• Yandex: Chromium compatible</text>
</svg>
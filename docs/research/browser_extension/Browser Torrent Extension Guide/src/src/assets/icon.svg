<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bg)"/>
  <!-- Magnet shape -->
  <g transform="translate(64, 64)">
    <!-- Magnet body -->
    <path d="M -30 -20 L -30 10 Q -30 35 0 35 Q 30 35 30 10 L 30 -20" 
          fill="none" stroke="#fff" stroke-width="14" stroke-linecap="round" opacity="0.95"/>
    <!-- Magnet tips -->
    <rect x="-30" y="-35" width="14" height="28" rx="7" fill="url(#accent)"/>
    <rect x="16" y="-35" width="14" height="28" rx="7" fill="url(#accent)"/>
    <!-- Center highlight -->
    <circle cx="0" cy="15" r="8" fill="rgba(255,255,255,0.2)"/>
  </g>
</svg>
